<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications</title>
</head>
<body>
    <h1>🔔Notifications</h1>

    {% if notifications %}
        <ul>
        {% for n in notifications %}
            <li>
                <strong>{{ n.message }}</strong>
                {% if n.created_at %} — <small>{{ n.created_at }}</small>{% endif %}
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No notifications.</p>
    {% endif %}

</body>
</html>
